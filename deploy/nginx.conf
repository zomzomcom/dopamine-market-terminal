# Nginx 生产配置 — 多巴胺行情终端
# 适用: 腾讯云 / 阿里云 Linux 服务器
# 放置: /etc/nginx/sites-available/dopamine
# 启用: ln -s /etc/nginx/sites-available/dopamine /etc/nginx/sites-enabled/

upstream dopamine_backend {
    server 127.0.0.1:5000;
    keepalive 32;
}

server {
    listen 80;
    server_name your-domain.com;  # 替换为你的域名

    # 如果已有 SSL 证书，取消下面注释并配置 HTTPS
    # listen 443 ssl http2;
    # ssl_certificate     /etc/nginx/ssl/your-domain.pem;
    # ssl_certificate_key /etc/nginx/ssl/your-domain.key;
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers HIGH:!aNULL:!MD5;

    # 客户端最大上传大小
    client_max_body_size 10m;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # 静态资源（直接由 nginx 提供，不经过 Flask）
    location /static/ {
        alias /opt/dopamine-market/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # 代理到 Gunicorn
    location / {
        proxy_pass http://dopamine_backend;
        proxy_http_version 1.1;

        # 长连接支持
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        # 缓冲
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
    }
}

