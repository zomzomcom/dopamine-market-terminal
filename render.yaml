services:
  - type: web
    name: dopamine-terminal
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.12
      - key: FLASK_ENV
        value: production
    plan: free
