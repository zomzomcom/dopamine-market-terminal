# Render.com Blueprint 部署配置
# 文档: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: dopamine-market-terminal
    env: python
    region: singapore  # 新加坡节点，亚洲访问速度较好
    plan: free
    buildCommand: pip install -r requirements.txt && python init_admin.py
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.12
      - key: FLASK_ENV
        value: production
      - key: DB_TYPE
        value: sqlite
      - key: SECRET_KEY
        generateValue: true
    autoDeploy: true
