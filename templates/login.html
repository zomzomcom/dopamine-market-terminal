<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 多巴胺行情终端</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .auth-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 420px;
            padding: 48px 40px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .auth-logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .auth-logo .logo-icon {
            width: 56px;
            height: 56px;
            margin: 0 auto 16px;
        }
        .auth-logo h1 {
            font-size: 24px;
            font-weight: 700;
            background: var(--grad-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .auth-logo p {
            color: var(--text-secondary);
            font-size: 14px;
            margin-top: 6px;
        }
        .auth-form .form-group {
            margin-bottom: 20px;
        }
        .auth-form label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }
        .auth-form input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid rgba(0,0,0,0.08);
            border-radius: var(--radius-sm);
            font-size: 15px;
            font-family: inherit;
            color: var(--text-primary);
            background: rgba(0,0,0,0.02);
            transition: var(--transition);
            outline: none;
        }
        .auth-form input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.15);
            background: #fff;
        }
        .auth-form .btn-primary {
            width: 100%;
            padding: 13px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            background: var(--grad-primary);
            color: #fff;
            transition: var(--transition);
            margin-top: 8px;
        }
        .auth-form .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: var(--shadow-glow);
        }
        .auth-form .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .auth-error {
            background: rgba(231,76,60,0.1);
            color: #e74c3c;
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }
        .auth-error.show { display: block; }
        .auth-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: var(--text-secondary);
        }
        .auth-footer a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
        .auth-footer a:hover {
            text-decoration: underline;
        }
        .auth-demo {
            margin-top: 20px;
            padding: 14px;
            background: rgba(102,126,234,0.08);
            border-radius: var(--radius-sm);
            font-size: 13px;
            color: var(--text-secondary);
            text-align: center;
            line-height: 1.6;
        }
        .auth-demo strong {
            color: var(--text-primary);
        }
    </style>
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 40 40" fill="none" width="56" height="56">
                        <rect x="2" y="2" width="36" height="36" rx="10" fill="url(#logoGrad)"/>
                        <path d="M10 28L16 18L22 24L30 12" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                        <circle cx="30" cy="12" r="3" fill="white"/>
                        <defs>
                            <linearGradient id="logoGrad" x1="0" y1="0" x2="40" y2="40">
                                <stop offset="0%" stop-color="#FF6B6B"/>
                                <stop offset="50%" stop-color="#A855F7"/>
                                <stop offset="100%" stop-color="#3B82F6"/>
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <h1>多巴胺行情终端</h1>
                <p>实时行情 · 智能分析</p>
            </div>

            <div class="auth-error" id="authError"></div>

            <form class="auth-form" id="loginForm">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" placeholder="请输入用户名" autocomplete="username" required>
                </div>
                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" placeholder="请输入密码" autocomplete="current-password" required>
                </div>
                <button type="submit" class="btn-primary" id="loginBtn">登 录</button>
            </form>

            <div class="auth-footer">
                还没有账号？<a href="/register">立即注册</a>
            </div>
        </div>
    </div>

    <script>
    const API_BASE = '';

    async function apiCall(path, method = 'GET', data = null) {
        const options = { method, headers: { 'Content-Type': 'application/json' } };
        if (data) options.body = JSON.stringify(data);
        const res = await fetch(API_BASE + path, options);
        return res.json();
    }

    function showError(msg) {
        const el = document.getElementById('authError');
        el.textContent = msg;
        el.classList.add('show');
        setTimeout(() => el.classList.remove('show'), 4000);
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('loginBtn');
        btn.disabled = true;
        btn.textContent = '登录中...';

        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();

        if (!username || !password) {
            showError('请输入用户名和密码');
            btn.disabled = false;
            btn.textContent = '登 录';
            return;
        }

        try {
            const res = await apiCall('/api/auth/login', 'POST', { username, password });
            if (res.success) {
                window.location.href = '/';
            } else {
                showError(res.message || '登录失败');
            }
        } catch (err) {
            showError('网络错误，请检查连接');
        }

        btn.disabled = false;
        btn.textContent = '登 录';
    });

    // 回车快捷登录
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') document.getElementById('loginForm').requestSubmit();
    });
    </script>
</body>
</html>
